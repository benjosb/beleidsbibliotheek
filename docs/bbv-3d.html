<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeleidsBibliotheek — BBV 3D</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="bbv-doc-preview.css">
<style>
:root {
  --bg: #f4f1eb;
  --text: #2c2c2c;
  --text-light: #7a7a7a;
  --accent: #c4a35a;
  --panel-width: 55%;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Work Sans', sans-serif;
  color: var(--text);
  overflow: hidden;
}

#canvas3d {
  position: fixed;
  inset: 0;
  z-index: 1;
  transition: opacity 0.6s ease;
}

.overlay-ui {
  position: fixed;
  z-index: 10;
  pointer-events: none;
}
.header-ui {
  top: 1.8rem;
  left: 0;
  right: 0;
  text-align: center;
  transition: opacity 0.5s ease;
}
.header-ui h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  letter-spacing: 0.04em;
}
.header-ui .subtitle {
  font-size: 0.85rem;
  color: var(--text-light);
  font-weight: 300;
  margin-top: 0.15rem;
}
.header-ui .bbv-nav-link {
  pointer-events: all;
  color: var(--text-light);
  text-decoration: underline;
  text-decoration-color: var(--accent);
  text-underline-offset: 2px;
}
.header-ui .bbv-nav-link:hover { color: var(--accent); }
body.detail-open .header-ui { opacity: 0; pointer-events: none; }

.controls-ui {
  bottom: 1.8rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 0.8rem;
  pointer-events: all;
  transition: opacity 0.5s ease;
}
body.detail-open .controls-ui { opacity: 0; pointer-events: none; }

.btn {
  font-family: 'Work Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 400;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 0.5em 1.3em;
  border: 1.5px solid var(--text-light);
  background: rgba(244,241,235,0.85);
  color: var(--text-light);
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.25s ease;
  backdrop-filter: blur(8px);
}
.btn:hover, .btn.active { border-color: var(--accent); color: var(--accent); }

.hint-ui {
  bottom: 4.5rem;
  left: 0; right: 0;
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-light);
  font-weight: 300;
  transition: opacity 0.5s ease;
}
body.detail-open .hint-ui { opacity: 0; }

.sphere-label {
  position: fixed;
  z-index: 20;
  pointer-events: none;
  text-align: center;
  transform: translate(-50%, -50%);
  transition: opacity 0.3s ease;
}
.sphere-label .sl-num {
  font-family: 'DM Serif Display', serif;
  font-size: 1.3rem;
  opacity: 0.45;
  display: block;
  line-height: 1;
}
.sphere-label .sl-name {
  font-size: 0.66rem;
  font-weight: 500;
  letter-spacing: 0.11em;
  text-transform: uppercase;
  white-space: nowrap;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}

.tooltip {
  position: fixed;
  z-index: 30;
  background: rgba(44,44,44,0.92);
  color: white;
  padding: 0.5em 1em;
  border-radius: 3px;
  font-size: 0.8rem;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease;
  transform: translate(-50%, -120%);
  backdrop-filter: blur(4px);
}
.tooltip.visible { opacity: 1; }

/* ── Content panel ── */
.content-panel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: var(--panel-width);
  background: rgba(244,241,235,0.97);
  backdrop-filter: blur(24px);
  z-index: 25;
  padding: 2.5rem 3rem 2.5rem 3.5rem;
  transform: translateX(105%);
  transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1),
              opacity 0.5s ease;
  opacity: 0;
  overflow-y: auto;
  overflow-anchor: none;
  border-left: 1px solid rgba(196,163,90,0.15);
}
.content-panel.visible {
  transform: translateX(0);
  opacity: 1;
}
.content-panel::-webkit-scrollbar { width: 5px; }
.content-panel::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

/* Terug-rij + dwell (zelfde plek als de klik-terugknop) */
.bdw-header-zone {
  position: sticky;
  top: 0;
  z-index: 3;
  margin: -0.25rem 0 1.25rem 0;
  padding: 0.15rem 0 0.65rem 0;
  background: linear-gradient(to bottom, rgba(244,241,235,0.98) 85%, rgba(244,241,235,0));
  box-shadow: 0 12px 16px -12px rgba(244,241,235,1);
  border-radius: 0 0 4px 4px;
  transition: background 0.2s ease;
}
.bdw-header-zone:hover {
  background: linear-gradient(to bottom, rgba(250,247,240,1) 88%, rgba(244,241,235,0));
}
.bdw-header-zone.bdw-charging {
  background: linear-gradient(to bottom, rgba(196,163,90,0.12) 70%, rgba(244,241,235,0));
}
.bdw-subhint {
  font-size: 0.68rem;
  font-weight: 300;
  color: var(--text-light);
  margin: 0 0 0.45rem 0;
  line-height: 1.4;
  letter-spacing: 0.02em;
  max-width: 28rem;
}
.bdw-track-h {
  height: 4px;
  border-radius: 2px;
  background: rgba(0,0,0,0.07);
  overflow: hidden;
}
.bdw-fill-h {
  height: 100%;
  width: 0%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), #a68b3d);
  box-shadow: 0 0 10px rgba(196,163,90,0.3);
}

.detail-back {
  font-family: 'Work Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0.3em 0;
  margin-bottom: 0.35rem;
  display: flex;
  align-items: center;
  gap: 0.4em;
  transition: opacity 0.2s;
}
.detail-back:hover { opacity: 0.6; }
.detail-back .arrow { font-size: 1.1rem; }

.chapter-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.6em;
  margin-bottom: 0.5rem;
}
.chapter-num {
  font-family: 'DM Serif Display', serif;
  font-size: 2.8rem;
  line-height: 1;
  opacity: 0.2;
}
.chapter-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.6rem;
  line-height: 1.25;
}
.chapter-sub {
  font-size: 0.82rem;
  color: var(--text-light);
  font-weight: 300;
  margin-bottom: 1.5rem;
  line-height: 1.5;
}
/* Inleiding: sneak preview + details; samenvatting wisselt open/dicht */
.chapter-intro-details {
  margin-bottom: 1.15rem;
}
.chapter-intro-details summary {
  cursor: pointer;
  list-style: none;
  padding: 0.4rem 0 0.5rem 0;
  user-select: none;
  border-radius: 4px;
}
.chapter-intro-details summary::-webkit-details-marker { display: none; }
.chapter-intro-details summary:hover {
  background: rgba(196,163,90,0.06);
}
.chapter-intro-details summary:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
}
.intro-preview-line {
  display: block;
  font-family: 'Work Sans', sans-serif;
  font-size: 0.86rem;
  font-weight: 400;
  line-height: 1.55;
  color: var(--text);
  letter-spacing: 0;
  text-transform: none;
  margin-bottom: 0.45rem;
  max-width: 36rem;
}
.intro-read-more-pill {
  display: inline-block;
  font-family: 'Work Sans', sans-serif;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  border: 1.5px solid rgba(196,163,90,0.45);
  padding: 0.28em 0.75em;
  border-radius: 3px;
  background: rgba(255,255,255,0.5);
}
.intro-sum-open {
  font-family: 'Work Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
}
.chapter-intro-details[open] summary .intro-sum-closed {
  display: none;
}
.chapter-intro-details:not([open]) summary .intro-sum-open {
  display: none;
}
.chapter-intro-plain {
  margin-bottom: 1.25rem;
}
.chapter-intro {
  font-size: 0.88rem;
  line-height: 1.7;
  color: var(--text);
  margin: 0.75rem 0 0 0;
  padding-top: 0.5rem;
  border-top: 1px solid rgba(0,0,0,0.06);
}
.panel-content-inner {
  position: relative;
}

.tv-section-title {
  font-family: 'Work Sans', sans-serif;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

/* ── Taakveld items: hover klapt uit (in flow); max-hoogte + interne scroll beperkt groei ── */
.tv-item {
  border-bottom: 1px solid rgba(0,0,0,0.05);
  padding: 0;
  position: relative;
}
.tv-header {
  display: flex;
  align-items: center;
  gap: 0.7em;
  padding: 0.85em 0;
  cursor: default;
  transition: background 0.2s ease;
}
.tv-item:hover .tv-header {
  background: rgba(196,163,90,0.06);
  margin: 0 -0.8em;
  padding-left: 0.8em;
  padding-right: 0.8em;
  border-radius: 4px;
}

.tv-arrow {
  font-size: 0.6rem;
  color: var(--text-light);
  transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
              color 0.2s ease;
  flex-shrink: 0;
  width: 1em;
  text-align: center;
}
.tv-item:hover .tv-arrow {
  transform: rotate(90deg);
  color: var(--accent);
}

.tv-code {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--accent);
  min-width: 2em;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.tv-name {
  font-size: 0.88rem;
  font-weight: 500;
  flex: 1;
}

.tv-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.48s cubic-bezier(0.22, 1, 0.36, 1),
              opacity 0.32s ease,
              padding 0.32s ease;
  opacity: 0;
  padding: 0 0 0 2.4em;
  margin: 0;
}
.tv-item:hover .tv-body {
  max-height: min(72vh, 30rem);
  opacity: 1;
  padding: 0.55em 0.85em 0.95em 1.1em;
  margin-left: 2.4em;
  overflow-y: auto;
  overflow-x: hidden;
  background: rgba(196,163,90,0.06);
  border-radius: 0 0 5px 5px;
  border-left: 2px solid rgba(196,163,90,0.28);
  border-bottom: 1px solid rgba(196,163,90,0.1);
  overscroll-behavior: contain;
}
.tv-body::-webkit-scrollbar { width: 4px; }
.tv-body::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.12);
  border-radius: 3px;
}

.tv-omschrijving {
  font-size: 0.82rem;
  line-height: 1.65;
  color: var(--text);
  margin-bottom: 0.6em;
  padding-left: 0.15em;
}
.tv-niet {
  font-size: 0.75rem;
  line-height: 1.55;
  color: var(--text-light);
  font-style: italic;
  padding-left: 0.8em;
  border-left: 2px solid rgba(196,163,90,0.3);
  margin-bottom: 0.15em;
}
.tv-niet strong {
  font-style: normal;
  font-weight: 500;
  color: var(--text);
}

.tv-toelichting {
  font-size: 0.76rem;
  line-height: 1.55;
  color: var(--text-light);
  margin-top: 0.5em;
  padding-top: 0.55em;
  border-top: 1px dashed rgba(0,0,0,0.1);
}
.tv-toelichting strong {
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.04em;
}

.tv-docs {
  margin-top: 0.75rem;
  padding-top: 0.65rem;
  border-top: 1px solid rgba(0,0,0,0.08);
}
.tv-docs-title {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 0.45rem;
}
.tv-docs-list {
  list-style: none;
  margin: 0;
  padding: 0;
}
.tv-doc-row {
  font-size: 0.78rem;
  line-height: 1.45;
  padding: 0.35rem 0;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
.tv-doc-row:last-child { border-bottom: none; }
.tv-doc-link {
  color: var(--text);
  text-decoration: underline;
  text-decoration-color: var(--accent);
  text-underline-offset: 2px;
}
.tv-doc-link:hover { color: var(--accent); }
.tv-doc-title { color: var(--text); }
.tv-doc-meta {
  display: block;
  font-size: 0.72rem;
  color: var(--text-light);
  margin-top: 0.15rem;
}
.tv-doc-toel {
  font-size: 0.72rem;
  color: var(--text-light);
  font-style: italic;
  margin-top: 0.12rem;
}

.tv-placeholder {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-light);
  font-size: 0.85rem;
  font-weight: 300;
}

/* ── Mini chapter indicator in content panel ── */
.chapter-color-bar {
  width: 4px;
  height: 40px;
  border-radius: 2px;
  margin-right: 0.6em;
  flex-shrink: 0;
}

</style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<div class="overlay-ui header-ui">
  <h1>BeleidsBibliotheek</h1>
  <p class="subtitle">Begroting en Verantwoording &middot; 9 hoofdstukken &middot; 42 taakvelden (Iv3-tegels) &middot; <a href="bbv-lijst.html" class="bbv-nav-link">Lijstweergave</a></p>
</div>

<div class="overlay-ui controls-ui">
  <button class="btn active" id="btnSpin" onclick="toggleSpin()">Auto-rotatie</button>
  <button class="btn" onclick="resetCam()">Reset</button>
</div>

<div class="overlay-ui hint-ui">Sleep om te draaien &middot; klik op een bol om in te zoomen</div>

<div class="tooltip" id="tooltip"></div>

<div class="content-panel" id="contentPanel">
  <header class="bdw-header-zone" id="bdwHeaderZone" title="Terug zonder klik: muis ±1 seconde in dit vlak laten rusten">
    <button type="button" class="detail-back" onclick="closeDetail()"><span class="arrow">&larr;</span> Terug naar overzicht</button>
    <p class="bdw-subhint">Zelfde effect als de knop: wijs hier ongeveer een seconde laten rusten — kleine beweging vanaf de tekst, geen klik.</p>
    <div class="bdw-track-h" aria-hidden="true"><div class="bdw-fill-h" id="bdwFill"></div></div>
  </header>
  <div id="panelContent" class="panel-content-inner"></div>
</div>

<script src="bbv-hoofdstukken-data.js"></script>
<script src="../wassenaar/beleidsnota-per-taakveld-data.js"></script>
<script type="importmap">
{ "imports": { "three": "https://esm.sh/three@0.162.0", "three/addons/": "https://esm.sh/three@0.162.0/examples/jsm/" } }
</script>
<script type="module">

    intro: `Dit is het eerste hoofdstuk van de BBV-structuur (Iv3): het draaipunt waar democratisch bestuur, financiële sturing en ondersteunende bedrijfsvoering samenkomen. College van burgemeester en wethouders, gemeenteraad, raadscommissies en griffie vormen het zichtbare bestuur; rekenkamer, ombudsfunctie en accountantscontrole geven toetsing en verantwoording richting burgers en toezichthouders.

Hier vallen ook de klassieke burgerzaken: basisregistratie personen, reisdocumenten, verkiezingen en referenda. Gemeentelijk vastgoed dat niet aan een specifiek beleidsveld is toe te wijzen — zoals het gemeentehuis of overige panden — hoort onder 0.3, terwijl onderwijs- en woningbouw elders in de BBV thuishoren.

/* ── Three.js setup ── */

const canvas = document.getElementById('canvas3d');
const tooltip = document.getElementById('tooltip');
const btnSpin = document.getElementById('btnSpin');
const contentPanel = document.getElementById('contentPanel');
const panelContent = document.getElementById('panelContent');
const bdwHeaderZone = document.getElementById('bdwHeaderZone');
const bdwFill = document.getElementById('bdwFill');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf4f1eb);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(9, 5, 13);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.minDistance = 4;
controls.maxDistance = 22;
controls.autoRotate = false;
let modelAutoRotate = true;

const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 8, 6);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0xc4a35a, 0.25);
fillLight.position.set(-3, -2, -4);
scene.add(fillLight);

const sphereGroup = new THREE.Group();
scene.add(sphereGroup);

const sphereMeshes = [];
const posMap = {};

HOOFDSTUKKEN.forEach(h => {
  const radius = h.code === 0 ? 0.55 : 0.45;
  const geo = new THREE.SphereGeometry(radius, 48, 48);
  const mat = new THREE.MeshStandardMaterial({
    color: h.color,
    metalness: 0.15,
    roughness: 0.35,
    envMapIntensity: 0.5,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...h.pos);
  mesh.userData = h;
  sphereGroup.add(mesh);
  sphereMeshes.push(mesh);
  posMap[h.code] = new THREE.Vector3(...h.pos);
});

/* ── Tubes (Atomium connections) ── */

const tubeMat = new THREE.MeshStandardMaterial({
  color: 0xc4a35a,
  metalness: 0.3,
  roughness: 0.4,
  transparent: true,
  opacity: 0.12,
});

const edges = [];
for (let i = 0; i < HOOFDSTUKKEN.length; i++) {
  edges.push([0, HOOFDSTUKKEN[i].code]);
  for (let j = i + 1; j < HOOFDSTUKKEN.length; j++) {
    const a = HOOFDSTUKKEN[i].pos;
    const b = HOOFDSTUKKEN[j].pos;
    const dist = Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2);
    if (dist < 4.2) {
      edges.push([HOOFDSTUKKEN[i].code, HOOFDSTUKKEN[j].code]);
    }
  }
}

const drawnEdges = new Set();
edges.forEach(([a, b]) => {
  const key = [Math.min(a,b), Math.max(a,b)].join('-');
  if (drawnEdges.has(key)) return;
  drawnEdges.add(key);
  const pA = posMap[a];
  const pB = posMap[b];
  if (!pA || !pB) return;
  const dir = new THREE.Vector3().subVectors(pB, pA);
  const len = dir.length();
  const mid = new THREE.Vector3().addVectors(pA, pB).multiplyScalar(0.5);
  const geo = new THREE.CylinderGeometry(0.035, 0.035, len, 8);
  const tube = new THREE.Mesh(geo, tubeMat);
  tube.position.copy(mid);
  tube.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
  sphereGroup.add(tube);
});

/* ── Labels ── */

const labelEls = [];
HOOFDSTUKKEN.forEach(h => {
  const div = document.createElement('div');
  div.className = 'sphere-label';
  div.innerHTML = `<span class="sl-num" style="color:${h.hex}">${h.code}</span><span class="sl-name">${h.kort}</span>`;
  document.body.appendChild(div);
  labelEls.push({ h, div });
});

/* ── Raycasting / hover ── */

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredMesh = null;

let viewState = 'overview';
let animProgress = 0;
let animFrom = {};
let animTo = {};
let activeChapter = null;

function clearHoverTooltip() {
  tooltip.classList.remove('visible');
  if (hoveredMesh) {
    hoveredMesh.material.emissive.setHex(0x000000);
    hoveredMesh = null;
  }
}

canvas.addEventListener('mouseleave', () => {
  if (viewState === 'overview') {
    clearHoverTooltip();
    canvas.style.cursor = 'grab';
  }
});

canvas.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  if (viewState !== 'overview') {
    clearHoverTooltip();
    return;
  }
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(sphereMeshes);
  if (intersects.length > 0) {
    const mesh = intersects[0].object;
    if (hoveredMesh !== mesh) {
      if (hoveredMesh) hoveredMesh.material.emissive.setHex(0x000000);
      hoveredMesh = mesh;
      hoveredMesh.material.emissive.setHex(0x3a2a10);
      canvas.style.cursor = 'pointer';
      tooltip.textContent = `${mesh.userData.code}. ${mesh.userData.naam}`;
      tooltip.classList.add('visible');
    }
    tooltip.style.left = e.clientX + 'px';
    tooltip.style.top = e.clientY + 'px';
  } else {
    if (hoveredMesh) {
      hoveredMesh.material.emissive.setHex(0x000000);
      hoveredMesh = null;
      canvas.style.cursor = 'grab';
      tooltip.classList.remove('visible');
    }
  }
});

/* ── Click → detail view ── */

const overviewCam = {
  pos: new THREE.Vector3(9, 5, 13),
  target: new THREE.Vector3(0, 0, 0),
  groupX: 0,
};

/* ── Terug zonder klik: dwell in paneelkop (zelfde plek als « Terug ») ── */
const DWELL_MS = 1150;
let dwellRaf = null;
let dwellT0 = 0;

function resetDwell() {
  if (dwellRaf) cancelAnimationFrame(dwellRaf);
  dwellRaf = null;
  dwellT0 = 0;
  if (bdwFill) bdwFill.style.width = '0%';
  if (bdwHeaderZone) bdwHeaderZone.classList.remove('bdw-charging');
}

function dwellFrame(now) {
  if (!dwellT0 || viewState !== 'detail') {
    resetDwell();
    return;
  }
  const elapsed = now - dwellT0;
  const p = Math.min(1, elapsed / DWELL_MS);
  if (bdwFill) bdwFill.style.width = `${p * 100}%`;
  if (p > 0.04 && bdwHeaderZone) bdwHeaderZone.classList.add('bdw-charging');
  if (p >= 1) {
    resetDwell();
    window.closeDetail();
    return;
  }
  dwellRaf = requestAnimationFrame(dwellFrame);
}

if (bdwHeaderZone) {
  bdwHeaderZone.addEventListener('mouseenter', () => {
    if (viewState !== 'detail') return;
    dwellT0 = performance.now();
    if (dwellRaf) cancelAnimationFrame(dwellRaf);
    dwellRaf = requestAnimationFrame(dwellFrame);
  });
  bdwHeaderZone.addEventListener('mouseleave', () => {
    resetDwell();
  });
}

function easeOutQuart(t) {
  return 1 - Math.pow(1 - t, 4);
}

function openDetail(h) {
  if (viewState !== 'overview') return;
  clearHoverTooltip();
  resetDwell();
  activeChapter = h;
  modelAutoRotate = false;
  btnSpin.classList.remove('active');
  viewState = 'zooming-in';
  animProgress = 0;

  const worldPos = new THREE.Vector3(...h.pos).applyMatrix4(sphereGroup.matrixWorld);
  const camDir = new THREE.Vector3().subVectors(camera.position, worldPos).normalize();
  const targetCamPos = worldPos.clone().add(camDir.multiplyScalar(4));
  targetCamPos.x -= 3;

  animFrom = {
    pos: camera.position.clone(),
    target: controls.target.clone(),
    groupX: sphereGroup.position.x,
  };
  animTo = {
    pos: targetCamPos,
    target: worldPos.clone().add(new THREE.Vector3(-1.5, 0, 0)),
    groupX: -3,
  };

  controls.enabled = false;
  document.body.classList.add('detail-open');

  renderPanel(h);
  setTimeout(() => contentPanel.classList.add('visible'), 200);
}

window.closeDetail = function() {
  if (viewState !== 'detail') return;
  resetDwell();
  contentPanel.classList.remove('visible');
  viewState = 'zooming-out';
  animProgress = 0;

  animFrom = {
    pos: camera.position.clone(),
    target: controls.target.clone(),
    groupX: sphereGroup.position.x,
  };
  animTo = {
    pos: overviewCam.pos.clone(),
    target: overviewCam.target.clone(),
    groupX: 0,
  };

  document.body.classList.remove('detail-open');
};

canvas.addEventListener('click', e => {
  if (viewState !== 'overview') return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(sphereMeshes);
  if (intersects.length > 0) {
    openDetail(intersects[0].object.userData);
  }
});

/* ── Render content panel ── */

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escapeAttr(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;');
}

function firstLinePreview(intro) {
  const t = String(intro).trim();
  if (!t) return '';
  const first = t.split(/\n/)[0].trim();
  const max = 130;
  if (first.length <= max) return first;
  const cut = first.slice(0, max);
  const sp = cut.lastIndexOf(' ');
  return ((sp > 55 ? cut.slice(0, sp) : cut).trim()) + '\u2026';
}

function introNeedsExpandControl(intro) {
  const t = String(intro).trim();
  if (!t) return false;
  if (/\n/.test(t)) return true;
  const preview = firstLinePreview(t);
  if (/\u2026$/.test(preview)) return true;
  return t.length > preview.length + 12;
}

function formatIntroBody(intro) {
  return escapeHtml(intro).replace(/\n/g, '<br>');
}

function normalizeTaakveldCode(code) {
  return String(code || '').replace(/\u2013/g, '-').replace(/\u2014/g, '-');
}

function docsForTaakveldCode(tvCode) {
  const m = typeof window !== 'undefined' ? window.BELEIDSNOTA_PER_TAAKVELD : null;
  if (!m || !tvCode) return [];
  if (Array.isArray(m[tvCode])) return m[tvCode];
  const norm = normalizeTaakveldCode(tvCode);
  if (Array.isArray(m[norm])) return m[norm];
  return [];
}

function renderTaakveldDocsHtml(tvCode) {
  const items = docsForTaakveldCode(tvCode);
  if (!items.length) return '';
  const rows = items.map((n) => {
    const parts = [];
    if (n.type) parts.push(escapeHtml(n.type));
    if (n.datum) parts.push(escapeHtml(n.datum));
    const meta = parts.length ? `<span class="tv-doc-meta">${parts.join(' · ')}</span>` : '';
    const toel = n.toelichting ? `<div class="tv-doc-toel">${escapeHtml(n.toelichting)}</div>` : '';
    const title = escapeHtml(n.naam || '');
    const previewAttr = n.preview ? ` data-preview-image="${escapeAttr(n.preview)}"` : '';
    const link = n.link
      ? `<a class="tv-doc-link" href="${escapeHtml(n.link)}" target="_blank" rel="noopener" data-doc-title="${escapeAttr(n.naam || '')}"${previewAttr}>${title}</a>`
      : `<span class="tv-doc-title">${title}</span>`;
    return `<li class="tv-doc-row">${link}${meta}${toel}</li>`;
  }).join('');
  return `<div class="tv-docs"><div class="tv-docs-title">Beleidsnota\u2019s en beleidsdocumenten</div><ul class="tv-docs-list">${rows}</ul></div>`;
}

function renderPanel(h) {
  const tvHtml = h.taakvelden.map(tv => {
    const nietHtml = tv.niet ? `<div class="tv-niet"><strong>Niet hier:</strong> ${tv.niet}</div>` : '';
    const toelHtml = tv.toelichting ? `<div class="tv-toelichting"><strong>Waarom zo gegroepeerd</strong> — ${tv.toelichting}</div>` : '';
    const docsHtml = renderTaakveldDocsHtml(tv.code);
    return `
      <div class="tv-item">
        <div class="tv-header">
          <span class="tv-arrow">&#9654;</span>
          <span class="tv-code">${tv.code}</span>
          <span class="tv-name">${tv.naam}</span>
        </div>
        <div class="tv-body">
          <div class="tv-omschrijving">${tv.omschrijving}</div>
          ${toelHtml}
          ${nietHtml}
          ${docsHtml}
        </div>
      </div>`;
  }).join('');

  const introBodyHtml = formatIntroBody(h.intro);
  const introBlock = introNeedsExpandControl(h.intro)
    ? `<details class="chapter-intro-details">
  <summary class="chapter-intro-summary">
    <span class="intro-sum-closed">
      <span class="intro-preview-line">${escapeHtml(firstLinePreview(h.intro))}</span>
      <span class="intro-read-more-pill">Lees meer\u2026</span>
    </span>
    <span class="intro-sum-open">Inleiding verbergen</span>
  </summary>
  <div class="chapter-intro">${introBodyHtml}</div>
</details>`
    : `<div class="chapter-intro chapter-intro-plain">${introBodyHtml}</div>`;

  panelContent.innerHTML = `
    <div class="chapter-badge">
      <div class="chapter-color-bar" style="background:${h.hex}"></div>
      <span class="chapter-num">${h.code}</span>
      <span class="chapter-title" style="color:${h.hex}">${h.naam}</span>
    </div>
    <p class="chapter-sub">${h.ondertitel}</p>
    ${introBlock}
    <div class="tv-section-title">Taakvelden (${h.taakvelden.length})</div>
    ${tvHtml}
  `;
}

/* ── Labels update ── */

function updateLabels() {
  const halfW = window.innerWidth / 2;
  const halfH = window.innerHeight / 2;
  labelEls.forEach(({ h, div }) => {
    const pos = new THREE.Vector3(...h.pos);
    pos.y += (h.code === 0) ? 0.75 : 0.6;
    pos.applyMatrix4(sphereGroup.matrixWorld);
    pos.project(camera);
    const x = pos.x * halfW + halfW;
    const y = -(pos.y * halfH) + halfH;
    div.style.left = x + 'px';
    div.style.top = y + 'px';
    div.style.opacity = pos.z > 1 ? '0' : (viewState === 'detail' ? '0.3' : '1');
  });
}

/* ── Highlight active sphere ── */

let glowRing = null;
function updateGlow() {
  if (glowRing) {
    sphereGroup.remove(glowRing);
    glowRing.geometry.dispose();
    glowRing.material.dispose();
    glowRing = null;
  }
  if (!activeChapter || viewState === 'overview') return;
  const p = posMap[activeChapter.code];
  if (!p) return;
  const ringGeo = new THREE.RingGeometry(0.56, 0.64, 48);
  const ringMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(activeChapter.color),
    transparent: true,
    opacity: 0.6,
    side: THREE.DoubleSide,
  });
  glowRing = new THREE.Mesh(ringGeo, ringMat);
  glowRing.position.copy(p);
  glowRing.lookAt(camera.position);
  sphereGroup.add(glowRing);
}

/* ── Animation loop ── */

function animate() {
  requestAnimationFrame(animate);

  if (modelAutoRotate && viewState === 'overview') {
    sphereGroup.rotation.y += 0.003;
  }

  if (viewState === 'zooming-in' || viewState === 'zooming-out') {
    animProgress = Math.min(animProgress + 0.014, 1);
    const t = easeOutQuart(animProgress);

    camera.position.lerpVectors(animFrom.pos, animTo.pos, t);
    controls.target.lerpVectors(animFrom.target, animTo.target, t);
    sphereGroup.position.x = animFrom.groupX + (animTo.groupX - animFrom.groupX) * t;

    if (animProgress >= 1) {
      if (viewState === 'zooming-in') {
        viewState = 'detail';
        controls.enabled = true;
        controls.minDistance = 2;
        controls.maxDistance = 10;
        updateGlow();
      } else {
        viewState = 'overview';
        activeChapter = null;
        clearHoverTooltip();
        resetDwell();
        controls.enabled = true;
        controls.minDistance = 4;
        controls.maxDistance = 22;
        updateGlow();
      }
    }
  }

  if (glowRing) {
    glowRing.lookAt(camera.position);
  }

  controls.update();
  updateLabels();
  renderer.render(scene, camera);
}

animate();

/* ── Resize ── */

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ── Controls ── */

window.toggleSpin = () => {
  modelAutoRotate = !modelAutoRotate;
  btnSpin.classList.toggle('active', modelAutoRotate);
};

window.resetCam = () => {
  clearHoverTooltip();
  resetDwell();
  contentPanel.classList.remove('visible');
  document.body.classList.remove('detail-open');
  viewState = 'overview';
  activeChapter = null;
  modelAutoRotate = false;
  btnSpin.classList.remove('active');
  controls.enabled = true;
  controls.minDistance = 4;
  controls.maxDistance = 22;
  sphereGroup.rotation.y = 0;
  sphereGroup.position.x = 0;
  camera.position.set(9, 5, 13);
  controls.target.set(0, 0, 0);
  updateGlow();
};
</script>
<script src="bbv-doc-preview.js"></script>
