<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vergelijk ACC ↔ PROD — BeleidsBibliotheek</title>
<style>
  :root {
    --oranje: #ea580c;
    --groen: #16a34a;
    --grijs: #64748b;
    --border: #e2e8f0;
    --tekst: #1e293b;
    --wit: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: var(--tekst); background: #f1f5f9;
  }

  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.5rem 1rem; background: var(--wit);
    border-bottom: 1px solid var(--border); height: 48px;
  }
  .toolbar h1 { font-size: 0.95rem; font-weight: 700; }
  .toolbar .controls { display: flex; gap: 0.5rem; align-items: center; }
  .toolbar select, .toolbar button {
    padding: 0.3rem 0.6rem; border: 1px solid var(--border);
    border-radius: 6px; font-size: 0.8rem; font-family: inherit;
    background: var(--wit); cursor: pointer;
  }
  .toolbar button:hover { background: #f1f5f9; }
  .toolbar .sync-label { font-size: 0.75rem; color: var(--grijs); }
  .toolbar input[type="checkbox"] { margin-right: 0.25rem; }

  .panels {
    display: grid; grid-template-columns: 1fr 1fr;
    height: calc(100vh - 48px);
  }

  .panel {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
  }
  .panel:last-child { border-right: none; }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.4rem 0.75rem;
    font-size: 0.75rem; font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .panel.acc .panel-header { background: #fff7ed; color: var(--oranje); }
  .panel.prod .panel-header { background: #ecfdf5; color: var(--groen); }

  .panel-header a {
    font-size: 0.7rem; color: inherit; text-decoration: none;
    padding: 0.15rem 0.4rem; border: 1px solid; border-radius: 4px;
  }
  .panel-header a:hover { text-decoration: underline; }

  .panel iframe {
    flex: 1; border: none; width: 100%;
  }

  .divider {
    width: 4px; background: var(--border); cursor: col-resize;
    position: relative; z-index: 10;
  }
  .divider:hover { background: #94a3b8; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>Vergelijk: Acceptatie ↔ Productie</h1>
  <div class="controls">
    <label class="sync-label">
      <input type="checkbox" id="sync-scroll" checked> Sync scroll
    </label>
    <select id="page-select" onchange="navigateTo(this.value)">
      <option value="/">Hoofdpagina</option>
      <option value="/overdrachtsdossier.html">Overdrachtsdossier</option>
      <option value="/beleidsnotas.html">Beleidsnota's</option>
      <option value="/wijzigingen.html">Wijzigingen</option>
      <option value="/reactie.html">Reactieformulier</option>
      <option value="/voorstel.html">Document voorstellen</option>
    </select>
    <button onclick="reloadBoth()">Herlaad beide</button>
  </div>
</div>

<div class="panels">
  <div class="panel acc">
    <div class="panel-header">
      <span>ACCEPTATIE — wassenaar.besluit-wijzer.nl</span>
      <a href="https://wassenaar.besluit-wijzer.nl" target="_blank">open apart</a>
    </div>
    <iframe id="frame-acc" src="https://wassenaar.besluit-wijzer.nl"></iframe>
  </div>
  <div class="panel prod">
    <div class="panel-header">
      <span>PRODUCTIE — beleidsbibliotheekwassenaar.nl</span>
      <a href="https://beleidsbibliotheekwassenaar.nl" target="_blank">open apart</a>
    </div>
    <iframe id="frame-prod" src="https://beleidsbibliotheekwassenaar.nl"></iframe>
  </div>
</div>

<script>
const accFrame = document.getElementById('frame-acc');
const prodFrame = document.getElementById('frame-prod');

function navigateTo(path) {
  accFrame.src = 'https://wassenaar.besluit-wijzer.nl' + path;
  prodFrame.src = 'https://beleidsbibliotheekwassenaar.nl' + path;
}

function reloadBoth() {
  accFrame.contentWindow.location.reload();
  prodFrame.contentWindow.location.reload();
}
</script>

</body>
</html>
