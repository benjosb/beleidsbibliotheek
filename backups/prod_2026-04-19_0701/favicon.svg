<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#55601c"/>
  <!-- Open book -->
  <g transform="translate(256,270)" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M-8,-90 C-8,-90 -30,-100 -120,-100 L-120,90 C-30,90 -8,80 -8,80"/>
    <!-- Right page -->
    <path d="M8,-90 C8,-90 30,-100 120,-100 L120,90 C30,90 8,80 8,80"/>
    <!-- Spine -->
    <line x1="0" y1="-90" x2="0" y2="80"/>
  </g>
  <!-- Text lines on left page -->
  <g stroke="#fff" stroke-width="10" stroke-linecap="round" opacity="0.9">
    <line x1="160" y1="200" x2="225" y2="200"/>
    <line x1="155" y1="225" x2="230" y2="225"/>
    <line x1="150" y1="250" x2="235" y2="250"/>
    <line x1="148" y1="275" x2="232" y2="275"/>
  </g>
  <!-- Checkmark on right page -->
  <polyline points="295,245 315,270 345,225" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
</svg>
