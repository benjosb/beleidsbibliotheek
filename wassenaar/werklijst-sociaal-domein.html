* { box-sizing: border-box; margin: 0; padding: 0; }

.stats { display: flex; gap: 0.5rem; flex-wrap: wrap; padding: 1rem 0; position: sticky; top: 0; background: #fafafa; z-index: 10; border-bottom: 1px solid #ddd; }

.stat--behandeling { background: var(--oranje-bg); color: #e65100; }
.stat--goedgekeurd { background: var(--groen-bg); color: var(--groen); }
.stat--afgekeurd { background: var(--rood-bg); color: var(--rood); }
.stat--verwerkt { background: var(--blauw-bg); color: var(--blauw); }
.taakveld-groep { margin-top: 1.5rem; }
.taakveld-kop { font-size: 1.05rem; font-weight: 700; color: var(--primary); padding: 0.5rem 0; border-bottom: 2px solid var(--primary-light); margin-bottom: 0.75rem; }
.kaart { background: #fff; border: 1px solid #e0e0e0; border-radius: var(--radius); padding: 1rem; margin-bottom: 0.75rem; transition: border-color 0.2s; }
.kaart:focus-within { border-color: var(--primary); }
.kaart-kop { display: flex; align-items: flex-start; gap: 0.5rem; flex-wrap: wrap; }
.kaart-titel { font-weight: 500; font-size: 0.95rem; flex: 1; min-width: 200px; }
.badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; }
.badge--link { background: #e3f2fd; color: #1565c0; }
.badge--verwijderen { background: #ffebee; color: #c62828; }
.badge--verplaatsen { background: #fff3e0; color: #e65100; }
.badge--toevoegen { background: #e8f5e9; color: #2e7d32; }
.badge--opmerking { background: #f3e5f5; color: #7b1fa2; }
.kaart-detail { margin-top: 0.6rem; font-size: 0.82rem; }
.kaart-detail dt { color: var(--grijs); font-weight: 400; margin-top: 0.35rem; }
.kaart-detail dd { margin-left: 0; word-break: break-all; }
.kaart-detail a { color: var(--blauw); text-decoration: none; }
.kaart-detail a:hover { text-decoration: underline; }
.link-oud { color: #999; text-decoration: line-through; }
.link-nieuw { color: var(--groen); font-weight: 500; }
.kaart-acties { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.75rem; flex-wrap: wrap; }
.kaart-acties select { padding: 0.3rem 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.82rem; font-family: inherit; }
.kaart-acties select.status--in_behandeling { border-color: var(--oranje); background: var(--oranje-bg); }
.kaart-acties select.status--goedgekeurd { border-color: var(--groen); background: var(--groen-bg); }
.kaart-acties select.status--afgekeurd { border-color: var(--rood); background: var(--rood-bg); }
.kaart-acties select.status--verwerkt { border-color: var(--blauw); background: var(--blauw-bg); }
.opmerking-input { flex: 1; min-width: 150px; padding: 0.3rem 0.5rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; font-family: inherit; }
.opmerking-input:focus { outline: none; border-color: var(--primary); }
.toolbar { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
.btn { padding: 0.45rem 1rem; border: 1px solid #ccc; border-radius: 4px; background: #fff; font-family: inherit; font-size: 0.85rem; cursor: pointer; }
.btn:hover { background: #f5f5f5; }
.btn--primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn--primary:hover { background: #6b7a24; }
.footer { margin: 2rem 0 1rem; padding-top: 1rem; border-top: 1px solid #e0e0e0; font-size: 0.8rem; color: var(--grijs); text-align: center; }
@media (max-width: 600px) {

    .kaart-kop { flex-direction: column; }
    .kaart-acties { flex-direction: column; align-items: stretch; }

    nieuwLink: null,
    opmerking_default: 'Collega noemt "Lokale wet- en regelgeving" — exacte URL navragen.'

const ACTIE_LABELS = {
    link_wijzigen: { label: 'Link wijzigen', css: 'badge--link' },
    verwijderen: { label: 'Verwijderen', css: 'badge--verwijderen' },
    verplaatsen: { label: 'Verplaatsen', css: 'badge--verplaatsen' },
    toevoegen: { label: 'Toevoegen', css: 'badge--toevoegen' },
    opmerking: { label: 'Opmerking', css: 'badge--opmerking' }
};

const STORAGE_KEY = 'werklijst-sd-status';

function loadStatus() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
}
function saveStatus(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let statusData = loadStatus();

function getStatus(id) { return statusData[id]?.status || 'in_behandeling'; }
function getOpmerking(id) {
    if (statusData[id]?.opmerking != null) return statusData[id].opmerking;
    const m = MUTATIES.find(x => x.id === id);
    return m?.opmerking_default || '';
}

function updateStats() {
    const counts = { totaal: MUTATIES.length, in_behandeling: 0, goedgekeurd: 0, afgekeurd: 0, verwerkt: 0 };
    MUTATIES.forEach(m => { counts[getStatus(m.id)]++; });
    document.getElementById('stats').innerHTML =
        `<span class="stat stat--totaal">${counts.totaal} totaal</span>` +
        `<span class="stat stat--behandeling">${counts.in_behandeling} in behandeling</span>` +
        `<span class="stat stat--goedgekeurd">${counts.goedgekeurd} goedgekeurd</span>` +
        `<span class="stat stat--afgekeurd">${counts.afgekeurd} afgekeurd</span>` +
        `<span class="stat stat--verwerkt">${counts.verwerkt} verwerkt</span>`;
}

function kortUrl(url) {
    if (!url) return '(geen)';
    try {
        const u = new URL(url);
        const p = u.pathname + u.search;
        return p.length > 60 ? u.hostname + p.substring(0, 57) + '...' : u.hostname + p;
    } catch { return url.substring(0, 70) + '...'; }
}

function renderKaart(m) {
    const a = ACTIE_LABELS[m.actie] || ACTIE_LABELS.opmerking;
    const st = getStatus(m.id);
    const opm = getOpmerking(m.id);
    let details = '';
    if (m.huidigLink) {
        details += `<dt>Huidige link:</dt><dd><a href="${m.huidigLink}" target="_blank" rel="noopener" class="${m.actie === 'verwijderen' ? 'link-oud' : ''}">${kortUrl(m.huidigLink)}</a></dd>`;
    }
    if (m.nieuwLink) {
        details += `<dt>Nieuwe link:</dt><dd><a href="${m.nieuwLink}" target="_blank" rel="noopener" class="link-nieuw">${kortUrl(m.nieuwLink)}</a></dd>`;
    }
    if (m.nieuwLocatie) {
        details += `<dt>Verplaatsen naar:</dt><dd class="link-nieuw">${m.nieuwLocatie}</dd>`;
    }
    details += `<dt>Toelichting collega:</dt><dd>${m.toelichting}</dd>`;

    return `<div class="kaart" id="kaart-${m.id}">
        <div class="kaart-kop">
            <span class="kaart-titel">${m.document}</span>
            <span class="badge ${a.css}">${a.label}</span>
        </div>
        <dl class="kaart-detail">${details}</dl>
        <div class="kaart-acties">
            <select data-id="${m.id}" class="status--${st}" onchange="wijzigStatus(this)">
                <option value="in_behandeling" ${st==='in_behandeling'?'selected':''}>In behandeling</option>
                <option value="goedgekeurd" ${st==='goedgekeurd'?'selected':''}>Goedgekeurd</option>
                <option value="afgekeurd" ${st==='afgekeurd'?'selected':''}>Afgekeurd</option>
                <option value="verwerkt" ${st==='verwerkt'?'selected':''}>Verwerkt</option>
            </select>
            <input type="text" class="opmerking-input" data-id="${m.id}" placeholder="Opmerking..." value="${opm.replace(/"/g,'&quot;')}" onchange="wijzigOpmerking(this)">
        </div>
    </div>`;
}

function render() {
    const groepen = {};
    MUTATIES.forEach(m => {
        const key = m.taakveldNaam;
        if (!groepen[key]) groepen[key] = [];
        groepen[key].push(m);
    });
    let html = '';
    for (const [naam, items] of Object.entries(groepen)) {
        html += `<div class="taakveld-groep"><h2 class="taakveld-kop">${naam}</h2>`;
        items.forEach(m => { html += renderKaart(m); });
        html += `</div>`;
    }
    document.getElementById('werklijst').innerHTML = html;
    updateStats();
}

function wijzigStatus(el) {
    const id = el.dataset.id;
    const val = el.value;
    if (!statusData[id]) statusData[id] = {};
    statusData[id].status = val;
    el.className = 'status--' + val;
    saveStatus(statusData);
    updateStats();
}

function wijzigOpmerking(el) {
    const id = el.dataset.id;
    if (!statusData[id]) statusData[id] = {};
    statusData[id].opmerking = el.value;
    saveStatus(statusData);
}

function zetAlles(status) {
    MUTATIES.forEach(m => {
        if (!statusData[m.id]) statusData[m.id] = {};
        statusData[m.id].status = status;
    });
    saveStatus(statusData);
    render();
}

function exportCSV() {
    const header = 'ID;Taakveld;Document;Actie;Status;Huidige link;Nieuwe link;Verplaatsen naar;Toelichting;Opmerking\n';
    const rows = MUTATIES.map(m => {
        const st = getStatus(m.id);
        const opm = getOpmerking(m.id);
        return [m.id, m.taakveld, `"${m.document}"`, m.actie, st,
            m.huidigLink || '', m.nieuwLink || '', m.nieuwLocatie || '',
            `"${m.toelichting}"`, `"${opm}"`].join(';');
    });
    const csv = header + rows.join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'werklijst-sociaal-domein.csv';
    a.click();
}

render();
</script>
