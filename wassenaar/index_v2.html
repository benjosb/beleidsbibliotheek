<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beleidsbibliotheek Wassenaar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo-link" aria-label="Gemeente Wassenaar">
                <img src="wassenaar_logo_fc kopie.svg" alt="Gemeente Wassenaar" class="site-logo">
            </a>
            <div class="header-text">
                <h1>Beleidsbibliotheek</h1>
                <p class="subtitle">Overzicht vastgesteld beleid</p>
            </div>
            <div class="header-zoek">
                <input type="text" id="searchInput" placeholder="Zoek op onderwerp of trefwoord…" autofocus>
                <button id="searchBtn" type="button">ZOEK</button>
            </div>
        </div>
    </header>

    <main class="container">
        <details class="zoekbalk-filters">
            <summary>Filters (jaar, type, periode)</summary>
            <div class="filters-row">
                <div class="filter-group">
                    <label for="yearFilter">Jaar</label>
                    <select id="yearFilter">
                        <option value="">Alle jaren</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                        <option value="2022">2022</option>
                        <option value="2021">2021</option>
                        <option value="2020">2020</option>
                        <option value="2019">2019</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="typeFilter">Type</label>
                    <select id="typeFilter">
                        <option value="">Alle typen</option>
                        <option value="raad">Raadsbesluit</option>
                        <option value="college">Collegebesluit (B&W)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="dateFrom">Van</label>
                    <input type="date" id="dateFrom">
                </div>
                <div class="filter-group">
                    <label for="dateTo">Tot</label>
                    <input type="date" id="dateTo">
                </div>
                <button id="clearFilters" type="button" class="btn-secondary">Wissen</button>
            </div>
        </details>

        <section class="thema-sectie">
            <h2 class="thema-sectie-titel">Beleidsgebieden</h2>
            <div id="themaBlokken" class="thema-blokken"></div>
        </section>

        <section class="results-sectie" id="resultsSectie">
            <div class="results-header">
                <div class="results-header-left">
                    <span id="resultsCount">0 besluiten</span>
                    <span id="gekozenThemaLabel" class="gekozen-thema" style="display: none;"><span id="gekozenThemaNaam"></span> <button type="button" id="gekozenThemaSluiten" aria-label="Filter op thema opheffen">✕</button></span>
                </div>
                <div class="sort-options">
                    <label for="sortBy">Sorteren</label>
                    <select id="sortBy">
                        <option value="datum-desc">Datum (nieuwste eerst)</option>
                        <option value="datum-asc">Datum (oudste eerst)</option>
                        <option value="naam-asc">Naam (A–Z)</option>
                        <option value="naam-desc">Naam (Z–A)</option>
                    </select>
                </div>
            </div>
            <div id="resultsList" class="results-list"></div>
            <div id="noResults" class="no-results" style="display: none;">
                <p id="noResultsText">Kies een beleidsgebied hierboven om de besluiten te bekijken.</p>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Beleidsbibliotheek Wassenaar · Versie <span id="appVersion">2.0.0</span> · <a href="https://www.wassenaar.nl" target="_blank" rel="noopener">wassenaar.nl</a></p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
